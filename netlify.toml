# Netlify configuration for CHED MED (Next.js 15 App Router, SSR + server actions).
# The official Next.js Runtime is auto-installed by Netlify and handles SSR,
# middleware (edge), and server actions — no static export needed.

[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  # pnpm 11.5 (pinned via packageManager) requires Node >= 22.13.
  NODE_VERSION = "22"
  # Use corepack so Netlify runs the same pnpm version you use locally.
  COREPACK_ENABLE = "1"

# Netlify auto-detects and applies this plugin, but declaring it is explicit.
[[plugins]]
  package = "@netlify/plugin-nextjs"
